<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixtures // Arsenal &amp; Springboks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff1a2e;
    --red-dim: rgba(255,26,46,0.12);
    --red-glow: 0 0 18px rgba(255,26,46,0.5), 0 0 40px rgba(255,26,46,0.2);
    --green: #00ff6a;
    --green-dim: rgba(0,255,106,0.10);
    --green-glow: 0 0 18px rgba(0,255,106,0.5), 0 0 40px rgba(0,255,106,0.2);
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #222222;
    --text: #e8e8e8;
    --muted: #555555;
    --faint: #1e1e1e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* GRID BACKGROUND */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* HEADER */
  header {
    padding: 3rem 0 2rem;
    display: flex;
    flex-direction: column;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem;
    position: relative;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 96px);
    letter-spacing: 0.04em;
    line-height: 0.9;
    color: var(--text);
  }

  .site-title .ars { color: var(--red); text-shadow: var(--red-glow); }
  .site-title .boks { color: var(--green); text-shadow: var(--green-glow); }

  .header-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 1.25rem;
  }

  .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .live-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #33ff33;
    box-shadow: 0 0 6px #33ff33;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* TAB SWITCHER */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: fit-content;
  }

  .tab-btn {
    background: transparent;
    border: none;
    padding: 10px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    position: relative;
  }

  .tab-btn:first-child { border-right: 1px solid var(--border); }

  .tab-btn.active-ars {
    color: var(--red);
    background: var(--red-dim);
    text-shadow: 0 0 10px rgba(255,26,46,0.6);
  }

  .tab-btn.active-boks {
    color: var(--green);
    background: var(--green-dim);
    text-shadow: 0 0 10px rgba(0,255,106,0.6);
  }

  .tab-btn:not(.active-ars):not(.active-boks):hover {
    background: var(--faint);
    color: var(--text);
  }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* MONTH GROUP */
  .month-group { margin-bottom: 2rem; }

  .month-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FIXTURE ROW */
  .fixture {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 4px;
    margin-bottom: 6px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fixture:hover { background: var(--surface2); }

  .fixture.ars-fixture { border-left-color: var(--red); }
  .fixture.ars-fixture:hover { box-shadow: -2px 0 20px rgba(255,26,46,0.15); }

  .fixture.boks-fixture { border-left-color: var(--green); }
  .fixture.boks-fixture:hover { box-shadow: -2px 0 20px rgba(0,255,106,0.15); }

  .fixture-date-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    padding-right: 16px;
  }

  .fix-day {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--text);
  }

  .fix-month {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .fixture-info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

  .fix-teams {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fix-teams .highlight-ars { color: var(--red); }
  .fix-teams .highlight-boks { color: var(--green); }

  .fix-venue {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fix-comp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fixture-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .badge-upcoming-ars { border: 1px solid rgba(255,26,46,0.4); color: var(--red); background: var(--red-dim); }
  .badge-upcoming-boks { border: 1px solid rgba(0,255,106,0.4); color: var(--green); background: var(--green-dim); }
  .badge-soon { border: 1px solid rgba(255,190,0,0.4); color: #ffbe00; background: rgba(255,190,0,0.08); }
  .badge-result { border: 1px solid var(--border); color: var(--muted); }

  .fix-kickoff {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* FOOTER */
  footer {
    margin-top: 4rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-logos { display: flex; gap: 16px; align-items: center; }
  .foot-dot-ars { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); }
  .foot-dot-boks { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }

  @media (max-width: 540px) {
    .fixture { grid-template-columns: 48px 1fr auto; gap: 10px; padding: 12px 12px; }
    .fix-day { font-size: 22px; }
    .fix-teams { font-size: 13px; }
    .header-meta { flex-direction: column; align-items: flex-start; gap: 6px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="eyebrow">Live Fixture Tracker</div>
    <div class="site-title">
      <span class="ars">ARS</span><span style="color:var(--border)"> / </span><span class="boks">BOKS</span>
    </div>
    <div class="header-meta">
      <div class="tagline">Arsenal FC &amp; Springboks · 2026 season</div>
      <div class="live-dot" id="updated-label">updated today</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active-ars" id="tab-ars" onclick="switchTab('ars')">⚽ Arsenal</button>
    <button class="tab-btn" id="tab-boks" onclick="switchTab('boks')">🏉 Springboks</button>
  </div>

  <div id="panel-ars" class="panel active"></div>
  <div id="panel-boks" class="panel"></div>

  <footer>
    <div class="footer-logos">
      <div class="foot-dot-ars"></div>
      <span>Arsenal FC</span>
      <div class="foot-dot-boks"></div>
      <span>Springboks</span>
    </div>
    <span id="footer-date"></span>
  </footer>

</div>

<script>
const TODAY = new Date();

function daysUntil(dateStr) {
  return Math.round((new Date(dateStr) - TODAY) / 86400000);
}

function badge(dateStr, team) {
  const d = daysUntil(dateStr);
  const cls = team === 'ars' ? 'badge-upcoming-ars' : 'badge-upcoming-boks';
  if (d < 0) return `<span class="badge badge-result">result</span>`;
  if (d === 0) return `<span class="badge badge-soon">today</span>`;
  if (d <= 7) return `<span class="badge badge-soon">in ${d}d</span>`;
  return `<span class="badge ${cls}">upcoming</span>`;
}

function fmt(dateStr, part) {
  const d = new Date(dateStr);
  if (part === 'day') return d.getDate();
  if (part === 'mon') return d.toLocaleDateString('en-ZA', { month: 'short' }).toUpperCase();
  if (part === 'month') return d.toLocaleDateString('en-ZA', { month: 'long', year: 'numeric' });
  if (part === 'dow') return d.toLocaleDateString('en-ZA', { weekday: 'short' }).toUpperCase();
}

function teamLabel(home, away, team) {
  const hcls = team === 'ars' ? 'highlight-ars' : 'highlight-boks';
  const isArsenal = t => t === 'Arsenal';
  const isBoks = t => t === 'South Africa';
  const check = team === 'ars' ? isArsenal : isBoks;
  const hl = t => check(t) ? `<span class="${hcls}">${t}</span>` : t;
  return `${hl(home)} <span style="color:var(--muted);font-weight:300">vs</span> ${hl(away)}`;
}

const ARSENAL = [
  { date: '2026-04-15', home: 'Arsenal', away: 'Sporting CP', venue: 'Emirates Stadium, London', comp: 'Champions League · QF Leg 2 (Agg: 1–0)', time: '21:00 SAST' },
  { date: '2026-04-19', home: 'Man City', away: 'Arsenal', venue: 'Etihad Stadium, Manchester', comp: 'Premier League', time: '17:30 SAST' },
  { date: '2026-04-25', home: 'Arsenal', away: 'Newcastle Utd', venue: 'Emirates Stadium, London', comp: 'Premier League', time: '18:30 SAST' },
  { date: '2026-04-29', home: 'UCL Semi-Final', away: 'TBD', venue: 'TBD', comp: 'Champions League · SF Leg 1 (if through)', time: 'TBC' },
  { date: '2026-05-02', home: 'Arsenal', away: 'Fulham', venue: 'Emirates Stadium, London', comp: 'Premier League', time: '18:30 SAST' },
  { date: '2026-05-06', home: 'UCL Semi-Final', away: 'TBD', venue: 'Emirates Stadium, London', comp: 'Champions League · SF Leg 2 (if through)', time: 'TBC' },
  { date: '2026-05-10', home: 'West Ham', away: 'Arsenal', venue: 'London Stadium', comp: 'Premier League', time: '17:30 SAST' },
  { date: '2026-05-17', home: 'Arsenal', away: 'Burnley', venue: 'Emirates Stadium, London', comp: 'Premier League', time: '16:00 SAST' },
  { date: '2026-05-24', home: 'Crystal Palace', away: 'Arsenal', venue: 'Selhurst Park, London', comp: 'Premier League · Final Day', time: '17:00 SAST' },
  { date: '2026-05-28', home: 'UCL Final', away: 'TBD', venue: 'Allianz Arena, Munich', comp: 'Champions League Final (if through)', time: 'TBC' },
];

const BOKS = [
  { date: '2026-06-20', home: 'South Africa', away: 'Barbarians', venue: 'Nelson Mandela Bay Stadium, Gqeberha', comp: 'Friendly (non-cap)', time: '17:00 SAST' },
  { date: '2026-07-04', home: 'South Africa', away: 'England', venue: 'Ellis Park, Johannesburg', comp: 'Nations Championship', time: '17:40 SAST' },
  { date: '2026-07-11', home: 'South Africa', away: 'Scotland', venue: 'Loftus Versfeld, Pretoria', comp: 'Nations Championship', time: '17:40 SAST' },
  { date: '2026-07-18', home: 'South Africa', away: 'Wales', venue: 'Kings Park, Durban', comp: 'Nations Championship', time: '17:40 SAST' },
  { date: '2026-08-08', home: 'Argentina', away: 'South Africa', venue: 'Estadio J. Amalfitani, Buenos Aires', comp: 'Nations Championship', time: 'TBC' },
  { date: '2026-08-22', home: 'South Africa', away: 'New Zealand', venue: 'Ellis Park, Johannesburg', comp: "Rugby's Greatest Rivalry · Test 1", time: '17:00 SAST' },
  { date: '2026-08-29', home: 'South Africa', away: 'New Zealand', venue: 'Cape Town Stadium', comp: "Rugby's Greatest Rivalry · Test 2", time: 'TBC' },
  { date: '2026-09-05', home: 'South Africa', away: 'New Zealand', venue: 'FNB Stadium, Soweto', comp: "Rugby's Greatest Rivalry · Test 3", time: 'TBC' },
  { date: '2026-09-12', home: 'South Africa', away: 'New Zealand', venue: 'M&T Bank Stadium, Baltimore', comp: "Rugby's Greatest Rivalry · Test 4", time: 'TBC' },
  { date: '2026-11-07', home: 'Italy', away: 'South Africa', venue: 'TBC', comp: 'Nations Championship', time: 'TBC' },
  { date: '2026-11-14', home: 'France', away: 'South Africa', venue: 'TBC', comp: 'Nations Championship', time: 'TBC' },
  { date: '2026-11-21', home: 'Ireland', away: 'South Africa', venue: 'TBC', comp: 'Nations Championship', time: 'TBC' },
  { date: '2026-11-28', home: 'Finals Weekend', away: 'Top 4 Nations', venue: 'Allianz Stadium, Twickenham', comp: 'Nations Championship Finals', time: 'TBC' },
];

function buildPanel(fixtures, team) {
  const groups = {};
  fixtures.forEach(f => {
    const k = fmt(f.date, 'month');
    if (!groups[k]) groups[k] = [];
    groups[k].push(f);
  });

  let html = '';
  let delay = 0;
  for (const [month, list] of Object.entries(groups)) {
    html += `<div class="month-group"><div class="month-header">${month}</div>`;
    list.forEach(f => {
      const cls = team === 'ars' ? 'ars-fixture' : 'boks-fixture';
      html += `
      <div class="fixture ${cls}" style="animation-delay:${delay * 40}ms">
        <div class="fixture-date-block">
          <div class="fix-day">${fmt(f.date,'day')}</div>
          <div class="fix-month">${fmt(f.date,'mon')}</div>
        </div>
        <div class="fixture-info">
          <div class="fix-teams">${teamLabel(f.home, f.away, team)}</div>
          <div class="fix-venue">${f.venue}</div>
          <div class="fix-comp">${f.comp}</div>
        </div>
        <div class="fixture-right">
          ${badge(f.date, team)}
          <div class="fix-kickoff">${f.time}</div>
        </div>
      </div>`;
      delay++;
    });
    html += `</div>`;
  }
  return html;
}

document.getElementById('panel-ars').innerHTML = buildPanel(ARSENAL, 'ars');
document.getElementById('panel-boks').innerHTML = buildPanel(BOKS, 'boks');

const now = new Date();
document.getElementById('updated-label').textContent = 'updated ' + now.toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
document.getElementById('footer-date').textContent = now.getFullYear() + ' · all times SAST';

function switchTab(t) {
  document.getElementById('panel-ars').classList.toggle('active', t === 'ars');
  document.getElementById('panel-boks').classList.toggle('active', t === 'boks');
  const a = document.getElementById('tab-ars');
  const b = document.getElementById('tab-boks');
  a.className = 'tab-btn' + (t === 'ars' ? ' active-ars' : '');
  b.className = 'tab-btn' + (t === 'boks' ? ' active-boks' : '');
}
</script>
</body>
</html>
