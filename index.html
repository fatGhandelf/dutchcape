<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Cosmic Sandbox</title>
<style>
  :root {
    --ink: #e8ecff;
    --dim: #8892b9;
    --accent: #7cc9ff;
    --warm: #ffb878;
    --violet: #b69cff;
    --panel: rgba(12, 14, 28, 0.55);
    --panel-border: rgba(140, 160, 220, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #04050b;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
      Helvetica, Arial, sans-serif;
    letter-spacing: 0.01em;
    user-select: none;
    -webkit-user-select: none;
  }

  #stage { position: fixed; inset: 0; display: block; cursor: crosshair; }

  /* Soft vignette */
  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode: multiply;
  }

  .panel {
    position: fixed;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-radius: 14px;
    padding: 12px 14px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.45);
  }

  /* ---- Top title ---- */
  #title {
    top: 16px; left: 16px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  #title .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #ffb878 45%, #ff6a3d 75%, #4a1a0a 100%);
    box-shadow: 0 0 12px rgba(255,170,100,0.8);
  }
  #title h1 {
    margin: 0;
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
    color: #e8ecff;
  }
  #title h1 span { color: #8892b9; font-weight: 400; }

  /* ---- Left toolbox ---- */
  #tools {
    top: 70px; left: 16px;
    width: 220px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--dim);
    margin: 2px 2px 6px 2px;
  }

  .body-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .body-btn {
    position: relative;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 10px 8px;
    color: var(--ink);
    font-size: 11px;
    cursor: pointer;
    transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .body-btn:hover { border-color: rgba(180,200,255,0.3); transform: translateY(-1px); }
  .body-btn.active {
    border-color: rgba(180,200,255,0.55);
    background: rgba(140,170,255,0.09);
    box-shadow: inset 0 0 0 1px rgba(180,200,255,0.15);
  }
  .body-btn .swatch {
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff, #5a9dff 55%, #0a1a44 100%);
    box-shadow: 0 0 10px rgba(130,180,255,0.55);
  }
  .body-btn[data-type="asteroid"] .swatch {
    background: radial-gradient(circle at 35% 35%, #fff, #bfc2c8 45%, #2a2d3a 100%);
    box-shadow: 0 0 6px rgba(200,210,230,0.4);
  }
  .body-btn[data-type="planet"] .swatch {
    background: radial-gradient(circle at 35% 35%, #fff, #5fb0ff 45%, #0a1a44 100%);
    box-shadow: 0 0 10px rgba(120,180,255,0.55);
  }
  .body-btn[data-type="star"] .swatch {
    background: radial-gradient(circle at 35% 35%, #fff, #ffd27a 38%, #ff6a3d 75%, #4a1a0a 100%);
    box-shadow: 0 0 14px rgba(255,170,100,0.9);
  }
  .body-btn[data-type="blackhole"] .swatch {
    background: radial-gradient(circle at 50% 50%, #000 55%, #b69cff 62%, transparent 80%);
    box-shadow: 0 0 14px rgba(180,150,255,0.6), inset 0 0 6px rgba(0,0,0,0.9);
  }
  .body-btn .name { font-size: 11px; color: var(--ink); letter-spacing: 0.06em; }

  .slider-row { display: flex; flex-direction: column; gap: 4px; margin-top: 4px; }
  .slider-row label {
    display: flex; justify-content: space-between;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--dim);
  }
  .slider-row label span { color: var(--ink); }
  input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 4px;
    background: rgba(255,255,255,0.08);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #dfe6ff; cursor: pointer;
    box-shadow: 0 0 8px rgba(180,200,255,0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #dfe6ff; cursor: pointer; border: none;
    box-shadow: 0 0 8px rgba(180,200,255,0.6);
  }

  .toggle-row {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .mini-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.12s ease;
    letter-spacing: 0.04em;
  }
  .mini-btn:hover { border-color: rgba(180,200,255,0.35); background: rgba(140,170,255,0.08); }
  .mini-btn.active {
    border-color: rgba(180,200,255,0.55);
    background: rgba(140,170,255,0.14);
    color: #fff;
  }

  /* ---- Bottom presets ---- */
  #presets {
    bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
    padding: 8px;
  }
  .preset-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--ink);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.12s ease;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .preset-btn:hover { border-color: rgba(180,200,255,0.45); background: rgba(140,170,255,0.09); transform: translateY(-1px); }

  /* ---- Right status ---- */
  #status {
    top: 16px; right: 16px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-align: right;
    padding: 10px 14px;
  }
  #status .val { color: var(--ink); font-variant-numeric: tabular-nums; }
  #status .row { display: flex; justify-content: space-between; gap: 14px; }
  #status .row + .row { margin-top: 4px; }

  /* ---- Hint ---- */
  #hint {
    bottom: 16px; right: 16px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.08em;
    padding: 10px 12px;
    max-width: 240px;
    line-height: 1.5;
  }
  #hint kbd {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    font-family: inherit;
    font-size: 10px;
    color: var(--ink);
    margin: 0 1px;
  }

  @media (max-width: 720px) {
    #tools { width: 180px; }
    #hint { display: none; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="vignette"></div>

<div id="title" class="panel">
  <div class="dot"></div>
  <h1>Cosmic Sandbox <span>· gravity playground</span></h1>
</div>

<div id="tools" class="panel">
  <div>
    <div class="section-label">Body</div>
    <div class="body-grid" id="bodyGrid">
      <button class="body-btn" data-type="asteroid"><div class="swatch"></div><div class="name">Asteroid</div></button>
      <button class="body-btn active" data-type="planet"><div class="swatch"></div><div class="name">Planet</div></button>
      <button class="body-btn" data-type="star"><div class="swatch"></div><div class="name">Star</div></button>
      <button class="body-btn" data-type="blackhole"><div class="swatch"></div><div class="name">Black Hole</div></button>
    </div>
  </div>

  <div>
    <div class="section-label">Physics</div>
    <div class="slider-row">
      <label>Gravity <span id="gVal">1.0×</span></label>
      <input type="range" id="gSlider" min="0" max="200" value="100" />
    </div>
    <div class="slider-row">
      <label>Time <span id="tVal">1.0×</span></label>
      <input type="range" id="tSlider" min="0" max="200" value="100" />
    </div>
    <div class="slider-row">
      <label>Trails <span id="trVal">Long</span></label>
      <input type="range" id="trSlider" min="0" max="100" value="75" />
    </div>
  </div>

  <div>
    <div class="section-label">Controls</div>
    <div class="toggle-row">
      <button class="mini-btn" id="pauseBtn">Pause</button>
      <button class="mini-btn" id="clearBtn">Clear</button>
    </div>
  </div>
</div>

<div id="status" class="panel">
  <div class="row"><span>Bodies</span><span class="val" id="sCount">0</span></div>
  <div class="row"><span>FPS</span><span class="val" id="sFps">—</span></div>
  <div class="row"><span>State</span><span class="val" id="sState">running</span></div>
</div>

<div id="presets" class="panel">
  <button class="preset-btn" data-preset="binary">Binary</button>
  <button class="preset-btn" data-preset="solar">Solar System</button>
  <button class="preset-btn" data-preset="trinary">3-Body</button>
  <button class="preset-btn" data-preset="galaxy">Galaxy</button>
  <button class="preset-btn" data-preset="collision">Collision</button>
</div>

<div id="hint" class="panel">
  <div><b style="color:var(--ink);">Click &amp; drag</b> to launch. Longer drag = faster.</div>
  <div style="margin-top:4px;">Keys: <kbd>Space</kbd> pause · <kbd>C</kbd> clear · <kbd>1</kbd>–<kbd>4</kbd> body</div>
</div>

<script>
"use strict";

/* ============================================================
   Cosmic Sandbox — n-body gravity playground
   ============================================================ */

const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  rebuildStarfield();
}
window.addEventListener("resize", resize);

/* ---------- Starfield background (parallax-twinkle) ---------- */
let stars = [];
function rebuildStarfield() {
  const count = Math.floor((W * H) / 2200);
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.pow(Math.random(), 3) * 1.4 + 0.15,
      tw: Math.random() * Math.PI * 2,
      sp: 0.4 + Math.random() * 1.2,
      hue: Math.random() < 0.1 ? (Math.random() < 0.5 ? 30 : 220) : 210,
    });
  }
}

function drawStarfield(t) {
  // Cosmic gradient base (drawn ONCE per frame under the trail-fade overlay)
  const g = ctx.createRadialGradient(W*0.3, H*0.25, 0, W*0.5, H*0.5, Math.max(W, H)*0.9);
  g.addColorStop(0, "rgba(30, 22, 64, 0.10)");
  g.addColorStop(0.45, "rgba(14, 12, 36, 0.05)");
  g.addColorStop(1, "rgba(3, 4, 10, 0.0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const tw = 0.55 + 0.45 * Math.sin(t * 0.001 * s.sp + s.tw);
    const a = tw * (0.5 + s.r * 0.4);
    if (s.hue === 30) ctx.fillStyle = `rgba(255, 210, 150, ${a})`;
    else if (s.hue === 220) ctx.fillStyle = `rgba(170, 200, 255, ${a})`;
    else ctx.fillStyle = `rgba(220, 230, 255, ${a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

/* ---------- Body definitions ---------- */
const BODY_TYPES = {
  asteroid: {
    mass: 1.2, radius: 3,
    core: "#e6ecff", mid: "#9aa3bc", edge: "#2a2d3a",
    glow: "rgba(200, 210, 240, 0.25)", glowR: 2.4,
    emits: false,
  },
  planet: {
    mass: 18, radius: 8,
    core: "#ffffff", mid: "#5fb0ff", edge: "#0a1a44",
    glow: "rgba(130, 180, 255, 0.45)", glowR: 3.2,
    emits: false,
  },
  star: {
    mass: 420, radius: 18,
    core: "#ffffff", mid: "#ffd27a", edge: "#ff5a2e",
    glow: "rgba(255, 170, 90, 0.75)", glowR: 6.0,
    emits: true, emitColor: [255, 200, 130],
  },
  blackhole: {
    mass: 2600, radius: 14,
    core: "#000000", mid: "#000000", edge: "#000000",
    glow: "rgba(180, 150, 255, 0.55)", glowR: 7.5,
    emits: true, emitColor: [190, 160, 255],
    blackhole: true,
  },
};

/* ---------- State ---------- */
const bodies = [];
const particles = []; // collision flashes + accretion
let nextId = 1;

let selectedType = "planet";
let gravityMul = 1.0;
let timeMul = 1.0;
let trailAlpha = 0.12; // semi-transparent overlay each frame (higher = shorter trails)
let paused = false;

const G = 0.35; // base gravitational constant (tuned for feel)
const SOFTENING = 6; // softening length (px)
const MAX_BODIES = 220;

/* Drag launch state */
let drag = null; // {x0,y0,x1,y1}

function addBody(x, y, vx, vy, type) {
  if (bodies.length >= MAX_BODIES) return;
  const def = BODY_TYPES[type];
  bodies.push({
    id: nextId++,
    x, y, vx, vy,
    ax: 0, ay: 0,
    mass: def.mass,
    radius: def.radius,
    type,
  });
}

function addParticle(x, y, vx, vy, life, color, size) {
  particles.push({ x, y, vx, vy, life, maxLife: life, color, size });
}

/* ---------- Physics ---------- */
function step(dt) {
  // Reset accelerations
  for (let i = 0; i < bodies.length; i++) {
    bodies[i].ax = 0;
    bodies[i].ay = 0;
  }

  // O(n^2) gravity — fine up to ~220 bodies
  for (let i = 0; i < bodies.length; i++) {
    const a = bodies[i];
    for (let j = i + 1; j < bodies.length; j++) {
      const b = bodies[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const r2 = dx*dx + dy*dy + SOFTENING*SOFTENING;
      const r = Math.sqrt(r2);
      const f = (G * gravityMul * a.mass * b.mass) / r2;
      const fx = (f * dx) / r;
      const fy = (f * dy) / r;
      a.ax += fx / a.mass;
      a.ay += fy / a.mass;
      b.ax -= fx / b.mass;
      b.ay -= fy / b.mass;
    }
  }

  // Integrate (semi-implicit Euler)
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    b.vx += b.ax * dt;
    b.vy += b.ay * dt;
    b.x  += b.vx * dt;
    b.y  += b.vy * dt;
  }

  // Collisions — merge smaller into larger
  for (let i = 0; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      const a = bodies[i], b = bodies[j];
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx*dx + dy*dy;
      const rsum = a.radius + b.radius;
      if (d2 < rsum * rsum * 0.55) {
        // Merge
        const big = a.mass >= b.mass ? a : b;
        const small = a.mass >= b.mass ? b : a;

        // Black hole swallows everything
        let newType = big.type;
        if (big.type === "blackhole" || small.type === "blackhole") newType = "blackhole";
        else if (big.type === "star" || small.type === "star") newType = "star";
        else if (big.type === "planet" || small.type === "planet") newType = "planet";

        const totalMass = big.mass + small.mass;
        big.vx = (big.vx * big.mass + small.vx * small.mass) / totalMass;
        big.vy = (big.vy * big.mass + small.vy * small.mass) / totalMass;
        big.x  = (big.x * big.mass + small.x * small.mass) / totalMass;
        big.y  = (big.y * big.mass + small.y * small.mass) / totalMass;
        big.mass = totalMass;
        big.type = newType;

        // Cap radius growth to type baseline scaled by mass ratio (visual only)
        const def = BODY_TYPES[newType];
        big.radius = Math.min(
          def.radius * Math.cbrt(totalMass / def.mass),
          newType === "blackhole" ? 46 : 40
        );

        // Collision burst
        const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
        const burst = 18 + Math.floor(Math.min(small.mass, 80) * 0.6);
        for (let k = 0; k < burst; k++) {
          const ang = Math.random() * Math.PI * 2;
          const sp = 0.5 + Math.random() * 3.5;
          const col = newType === "blackhole" ? [200,170,255]
                    : newType === "star" ? [255,210,140]
                    : [180, 210, 255];
          addParticle(cx, cy, Math.cos(ang)*sp, Math.sin(ang)*sp,
            0.5 + Math.random()*0.8, col, 1 + Math.random()*1.5);
        }

        // Remove smaller
        bodies.splice(bodies.indexOf(small), 1);
        // Restart inner loop
        break;
      }
    }
  }

  // Cull bodies way off-screen (garbage collection for launched misses)
  const pad = 2400;
  for (let i = bodies.length - 1; i >= 0; i--) {
    const b = bodies[i];
    if (b.x < -pad || b.x > W + pad || b.y < -pad || b.y > H + pad) {
      bodies.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.985; p.vy *= 0.985;
    p.life -= 0.016;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Emit accretion / coronal particles from stars + black holes
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    const def = BODY_TYPES[b.type];
    if (!def.emits) continue;
    if (Math.random() < (def.blackhole ? 0.9 : 0.55)) {
      const ang = Math.random() * Math.PI * 2;
      const rad = b.radius * (def.blackhole ? 1.7 : 1.1);
      const sp = def.blackhole ? 0.3 + Math.random()*0.8 : 0.2 + Math.random()*0.6;
      addParticle(
        b.x + Math.cos(ang) * rad,
        b.y + Math.sin(ang) * rad,
        Math.cos(ang) * sp * (def.blackhole ? -1 : 1) + b.vx * 0.3,
        Math.sin(ang) * sp * (def.blackhole ? -1 : 1) + b.vy * 0.3,
        0.4 + Math.random() * 0.6,
        def.emitColor,
        0.8 + Math.random() * 1.2
      );
    }
  }
}

/* ---------- Render ---------- */
function drawBody(b) {
  const def = BODY_TYPES[b.type];

  // Outer glow (big soft radial)
  const gr = b.radius * def.glowR;
  const glow = ctx.createRadialGradient(b.x, b.y, b.radius * 0.6, b.x, b.y, gr);
  glow.addColorStop(0, def.glow);
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(b.x, b.y, gr, 0, Math.PI * 2);
  ctx.fill();

  if (def.blackhole) {
    // Accretion ring
    const ring = ctx.createRadialGradient(b.x, b.y, b.radius * 0.85, b.x, b.y, b.radius * 1.6);
    ring.addColorStop(0, "rgba(255, 200, 120, 0)");
    ring.addColorStop(0.35, "rgba(255, 180, 110, 0.6)");
    ring.addColorStop(0.55, "rgba(200, 160, 255, 0.9)");
    ring.addColorStop(1, "rgba(100, 80, 220, 0)");
    ctx.fillStyle = ring;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 1.6, 0, Math.PI * 2);
    ctx.fill();

    // Pure black event horizon
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.radius * 0.95, 0, Math.PI * 2);
    ctx.fill();
    return;
  }

  // Core gradient (3-stop)
  const core = ctx.createRadialGradient(
    b.x - b.radius * 0.3, b.y - b.radius * 0.3, b.radius * 0.1,
    b.x, b.y, b.radius
  );
  core.addColorStop(0, def.core);
  core.addColorStop(0.55, def.mid);
  core.addColorStop(1, def.edge);
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  ctx.globalCompositeOperation = "lighter";
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const a = Math.max(0, p.life / p.maxLife);
    const c = p.color;
    ctx.fillStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${a * 0.9})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = "source-over";
}

function drawDragArrow() {
  if (!drag) return;
  const { x0, y0, x1, y1 } = drag;
  const dx = x1 - x0, dy = y1 - y0;
  const len = Math.hypot(dx, dy);
  if (len < 2) return;

  // Line
  ctx.strokeStyle = "rgba(180, 210, 255, 0.55)";
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead at end
  const ang = Math.atan2(dy, dx);
  const ah = 8;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 - Math.cos(ang - 0.4) * ah, y1 - Math.sin(ang - 0.4) * ah);
  ctx.lineTo(x1 - Math.cos(ang + 0.4) * ah, y1 - Math.sin(ang + 0.4) * ah);
  ctx.closePath();
  ctx.fillStyle = "rgba(200, 220, 255, 0.75)";
  ctx.fill();

  // Ghost body at origin
  const def = BODY_TYPES[selectedType];
  ctx.globalAlpha = 0.7;
  drawBody({ x: x0, y: y0, radius: def.radius, type: selectedType });
  ctx.globalAlpha = 1;

  // Speed badge
  const speed = len * 0.03;
  ctx.fillStyle = "rgba(220, 230, 255, 0.85)";
  ctx.font = "500 10px -apple-system, Segoe UI, sans-serif";
  ctx.textBaseline = "top";
  ctx.fillText(`v ≈ ${speed.toFixed(1)}`, x1 + 8, y1 + 6);
}

/* ---------- Main loop ---------- */
let last = performance.now();
let fpsAccum = 0, fpsFrames = 0, fpsDisplay = 0, fpsTimer = 0;

function frame(now) {
  const raw = (now - last) / 16.6667; // frames at 60fps reference
  last = now;
  const dt = Math.min(raw, 3) * timeMul;

  // FPS meter
  fpsAccum += (now - last + 16.6667); // approx
  fpsFrames++;
  fpsTimer += (1000 / 60);
  if (fpsFrames >= 20) {
    const rate = 1000 / ((performance.now() - (window.__fpsMark || now - 16.6667*fpsFrames)) / fpsFrames);
    fpsDisplay = Math.round(rate);
    window.__fpsMark = performance.now();
    fpsFrames = 0;
  }

  if (!paused) step(dt);

  // Trail fade overlay
  ctx.fillStyle = `rgba(3, 4, 10, ${trailAlpha})`;
  ctx.fillRect(0, 0, W, H);

  drawStarfield(now);
  drawParticles();

  // Draw bodies with additive glow layer first, then crisp on top
  ctx.globalCompositeOperation = "lighter";
  for (const b of bodies) {
    const def = BODY_TYPES[b.type];
    if (def.blackhole) continue;
    const gr = b.radius * def.glowR;
    const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, gr);
    glow.addColorStop(0, def.glow);
    glow.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(b.x, b.y, gr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = "source-over";

  for (const b of bodies) drawBody(b);

  drawDragArrow();

  // HUD
  sCount.textContent = bodies.length;
  sFps.textContent = fpsDisplay || "—";

  requestAnimationFrame(frame);
}

/* ---------- Input ---------- */
canvas.addEventListener("pointerdown", (e) => {
  if (e.target !== canvas) return;
  drag = { x0: e.clientX, y0: e.clientY, x1: e.clientX, y1: e.clientY };
});
canvas.addEventListener("pointermove", (e) => {
  if (!drag) return;
  drag.x1 = e.clientX;
  drag.y1 = e.clientY;
});
canvas.addEventListener("pointerup", (e) => {
  if (!drag) return;
  const dx = drag.x1 - drag.x0;
  const dy = drag.y1 - drag.y0;
  // drag from body → velocity direction AWAY from drag-end (slingshot)
  const vx = -dx * 0.03;
  const vy = -dy * 0.03;
  addBody(drag.x0, drag.y0, vx, vy, selectedType);
  drag = null;
});
canvas.addEventListener("pointercancel", () => drag = null);

// Keyboard
window.addEventListener("keydown", (e) => {
  if (e.code === "Space") { e.preventDefault(); togglePause(); }
  else if (e.key === "c" || e.key === "C") clearAll();
  else if (e.key === "1") selectType("asteroid");
  else if (e.key === "2") selectType("planet");
  else if (e.key === "3") selectType("star");
  else if (e.key === "4") selectType("blackhole");
});

/* ---------- UI wiring ---------- */
const gSlider = document.getElementById("gSlider");
const tSlider = document.getElementById("tSlider");
const trSlider = document.getElementById("trSlider");
const gVal = document.getElementById("gVal");
const tVal = document.getElementById("tVal");
const trVal = document.getElementById("trVal");
const pauseBtn = document.getElementById("pauseBtn");
const clearBtn = document.getElementById("clearBtn");
const sCount = document.getElementById("sCount");
const sFps = document.getElementById("sFps");
const sState = document.getElementById("sState");

gSlider.addEventListener("input", () => {
  gravityMul = gSlider.value / 100;
  gVal.textContent = gravityMul.toFixed(2) + "×";
});
tSlider.addEventListener("input", () => {
  timeMul = tSlider.value / 100;
  tVal.textContent = timeMul.toFixed(2) + "×";
});
trSlider.addEventListener("input", () => {
  // slider 0 → no trails (alpha 1), 100 → very long (alpha 0.01)
  const v = trSlider.value / 100;
  trailAlpha = 0.01 + Math.pow(1 - v, 2) * 0.99;
  trVal.textContent = v < 0.15 ? "Off" : v < 0.5 ? "Short" : v < 0.85 ? "Long" : "Infinite";
});

pauseBtn.addEventListener("click", togglePause);
clearBtn.addEventListener("click", clearAll);

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? "Resume" : "Pause";
  pauseBtn.classList.toggle("active", paused);
  sState.textContent = paused ? "paused" : "running";
}
function clearAll() {
  bodies.length = 0;
  particles.length = 0;
}

document.querySelectorAll("#bodyGrid .body-btn").forEach(btn => {
  btn.addEventListener("click", () => selectType(btn.dataset.type));
});
function selectType(t) {
  selectedType = t;
  document.querySelectorAll("#bodyGrid .body-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.type === t);
  });
}

document.querySelectorAll("#presets .preset-btn").forEach(btn => {
  btn.addEventListener("click", () => loadPreset(btn.dataset.preset));
});

/* ---------- Presets ---------- */
function loadPreset(name) {
  clearAll();
  const cx = W / 2, cy = H / 2;
  switch (name) {
    case "binary": {
      // Two stars orbiting common barycenter
      const d = 140;
      const m = BODY_TYPES.star.mass;
      const v = Math.sqrt(G * gravityMul * m / (2*d)) * 0.75;
      addBody(cx - d, cy, 0, -v, "star");
      addBody(cx + d, cy, 0,  v, "star");
      break;
    }
    case "solar": {
      addBody(cx, cy, 0, 0, "star");
      const orbits = [90, 140, 200, 270, 340];
      const types = ["asteroid","planet","planet","planet","asteroid"];
      for (let i = 0; i < orbits.length; i++) {
        const r = orbits[i];
        const v = Math.sqrt(G * gravityMul * BODY_TYPES.star.mass / r) * 0.9;
        const a = Math.random() * Math.PI * 2;
        addBody(cx + Math.cos(a)*r, cy + Math.sin(a)*r,
                -Math.sin(a)*v, Math.cos(a)*v, types[i]);
      }
      // asteroid belt
      for (let k = 0; k < 30; k++) {
        const r = 230 + Math.random()*30;
        const a = Math.random() * Math.PI * 2;
        const v = Math.sqrt(G * gravityMul * BODY_TYPES.star.mass / r) * 0.88;
        addBody(cx + Math.cos(a)*r, cy + Math.sin(a)*r,
                -Math.sin(a)*v, Math.cos(a)*v, "asteroid");
      }
      break;
    }
    case "trinary": {
      // Chaotic three-body
      const r = 130;
      for (let i = 0; i < 3; i++) {
        const ang = (i / 3) * Math.PI * 2;
        const v = 1.3 + Math.random()*0.3;
        addBody(cx + Math.cos(ang)*r, cy + Math.sin(ang)*r,
                -Math.sin(ang)*v * 0.8, Math.cos(ang)*v * 0.8, "star");
      }
      break;
    }
    case "galaxy": {
      // Black hole + swirling disk
      addBody(cx, cy, 0, 0, "blackhole");
      const count = 140;
      for (let i = 0; i < count; i++) {
        const r = 70 + Math.pow(Math.random(), 0.7) * 320;
        const a = Math.random() * Math.PI * 2;
        const v = Math.sqrt(G * gravityMul * BODY_TYPES.blackhole.mass / r) * 0.95;
        const type = Math.random() < 0.08 ? "planet" : "asteroid";
        addBody(cx + Math.cos(a)*r, cy + Math.sin(a)*r,
                -Math.sin(a)*v, Math.cos(a)*v, type);
      }
      break;
    }
    case "collision": {
      // Two galaxies on collision course
      const offsets = [[-260, -80], [260, 80]];
      const vels = [[1.0, 0.2], [-1.0, -0.2]];
      for (let g = 0; g < 2; g++) {
        const [ox, oy] = offsets[g];
        const [vx, vy] = vels[g];
        const bx = cx + ox, by = cy + oy;
        addBody(bx, by, vx, vy, "star");
        for (let i = 0; i < 40; i++) {
          const r = 30 + Math.pow(Math.random(), 0.7) * 100;
          const a = Math.random() * Math.PI * 2;
          const orb = Math.sqrt(G * gravityMul * BODY_TYPES.star.mass / r) * 0.9;
          addBody(
            bx + Math.cos(a)*r, by + Math.sin(a)*r,
            vx - Math.sin(a)*orb, vy + Math.cos(a)*orb,
            Math.random() < 0.12 ? "planet" : "asteroid"
          );
        }
      }
      break;
    }
  }
}

/* ---------- Boot ---------- */
resize();
loadPreset("solar");
requestAnimationFrame((t) => { last = t; frame(t); });

/* ---------- Better FPS ---------- */
(function() {
  let frames = 0, mark = performance.now();
  setInterval(() => {
    const now = performance.now();
    const fps = (frames * 1000) / (now - mark);
    fpsDisplay = Math.round(fps);
    frames = 0;
    mark = now;
  }, 500);
  const orig = window.requestAnimationFrame;
  window.requestAnimationFrame = function(cb) {
    return orig(function(t) { frames++; cb(t); });
  };
})();
</script>
</body>
</html>
